---
# Foreman Role - Main Tasks
# This role handles Foreman-related operations including EDPM node provisioning

- name: Set fact for foreman_user and foreman_password
  ansible.builtin.set_fact:
    foreman_user: "{{ all_nodes[0].pm_user }}"
    foreman_password: "{{ all_nodes[0].pm_password }}"

- name: Generate Foreman configuration file
  template:
    src: "foreman_config.j2"
    dest: "/tmp/foreman_config_updated_{{ cloud }}.yml"

# Boot mode (Bios/UEFI) per node for Foreman PXE loader; separate from which tool we use to set boot device (regex below).
- name: Determine actual boot mode and PXE loader for each node
  set_fact:
    node_boot_modes: "{{ node_boot_modes | default([]) + [{'node': item, 'boot_mode': boot_mode_result, 'pxe_loader': pxe_loader_result, 'use_ipmitool_bootdev': use_ipmitool_bootdev}] }}"
  vars:
    boot_mode_result: >-
      {%- if item is match('.*(1029u|1029p|5039ms|6018r|6029p|6029r|6048p|6048r|6049p).*') -%}
        Bios
      {%- elif item is match('.*r660.*') -%}
        UEFI
      {%- else -%}
        {%- set badfish_result = lookup('pipe', 'podman run quay.io/quads/badfish:latest --get-bios-attribute --attribute BootMode -H mgmt-' + item + ' -u ' + foreman_user + ' -p ' + foreman_password + ' -o json 2>&1 | jq -r .CurrentValue') -%}
        {%- if badfish_result and badfish_result != 'null' and badfish_result != '' -%}
          {{ badfish_result }}
        {%- else -%}
          UEFI
        {%- endif -%}
      {%- endif -%}
    pxe_loader_result: "{{ 'PXELinux BIOS' if boot_mode_result == 'Bios' else 'Grub2 UEFI' }}"
    # For set boot device only: if hostname matches SuperMicro regex use ipmitool, else badfish foreman
    use_ipmitool_bootdev: "{{ item is match('.*(1029u|1029p|5039ms|6018r|6029p|6029r|6048p|6048r|6049p).*') }}"
  loop: "{{ edpm_nodes }}"

- name: Update Foreman host configuration for each node
  shell: |
    podman run \
      -v /tmp/foreman_config_updated_{{ cloud }}.yml:/opt/hammer/foreman_config.yml \
      quay.io/cloud-bulldozer/foreman-cli:latest \
      hammer \
      -c /opt/hammer/foreman_config.yml \
      --verify-ssl false \
      -u {{ cloud }} \
      -p {{ foreman_password }} \
      host update \
      --name {{ item.node }} \
      --operatingsystem "{{ foreman_os }}" \
      --pxe-loader "{{ item.pxe_loader }}" \
      --build 1
  loop: "{{ node_boot_modes }}"
  register: foreman_update_results

# Set boot device: SuperMicro regex (1029u|1029p|...) -> ipmitool; else -> badfish foreman (skip boot device change for non-SuperMicro = use badfish)
- name: Set boot device via ipmitool (SuperMicro nodes matching 1029u|1029p|5039ms|6018r|6029p|6029r|6048p|6048r|6049p)
  shell: |
    podman run quay.io/ocp-edge-qe/ipmitool ipmitool -I lanplus -H mgmt-{{ item.node }} -U {{ foreman_user }} -P {{ foreman_password }} chassis bootdev pxe
  loop: "{{ node_boot_modes | selectattr('use_ipmitool_bootdev') | list }}"
  register: pxe_bootdev_results

- name: Set boot device via badfish foreman (all other nodes)
  shell: |
    podman run quay.io/quads/badfish:latest -H mgmt-{{ item.node }} -u {{ foreman_user }} -p {{ foreman_password }} -i config/idrac_interfaces.yml -t foreman
  loop: "{{ node_boot_modes | rejectattr('use_ipmitool_bootdev') | list }}"
  register: foreman_bootdev_results
  ignore_errors: true

- name: Fail if any set boot device (PXE or Foreman) had failures
  ansible.builtin.fail:
    msg: >-
      Set boot device failed.
      PXE (ipmitool) failures: {{ pxe_failures | map(attribute='node') | list | join(', ') or 'none' }}
      Foreman (badfish) failures: {{ foreman_failures | map(attribute='node') | list | join(', ') or 'none' }}
  when: (pxe_failures | length + foreman_failures | length) > 0
  vars:
    pxe_failures: "{{ (pxe_bootdev_results | default({'results': []})).results | selectattr('failed') | map(attribute='item') | list }}"
    foreman_failures: "{{ (foreman_bootdev_results | default({'results': []})).results | selectattr('failed') | map(attribute='item') | list }}"

- name: Reboot all nodes via badfish
  shell: |
    podman run quay.io/quads/badfish:latest --reboot-only -H mgmt-{{ item.node }} -u {{ foreman_user }} -p {{ foreman_password }}
  loop: "{{ node_boot_modes }}"
  register: reboot_results

- name: Wait for nodes to be SSH accessible after reboot
  shell: |
    sshpass -p {{ ssh_password }} ssh -o ConnectTimeout=10 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null root@{{ item.node }} 'hostname'
  loop: "{{ node_boot_modes }}"
  register: ssh_check_results
  retries: 30
  delay: 30
  until: ssh_check_results is succeeded

- name: Remove existing SSH keys for all nodes
  shell: |
    ssh-keygen -R {{ item.node }} 2>/dev/null || true
  loop: "{{ node_boot_modes }}"

- name: Get SSH host keys for all nodes
  shell: |
    ssh-keyscan -t ecdsa,ed25519,rsa {{ item.node }} 2>/dev/null
  loop: "{{ node_boot_modes }}"
  register: ssh_keys_result
  changed_when: false

- name: Add SSH keys to known_hosts for all nodes
  ansible.builtin.known_hosts:
    name: "{{ item.item.node }}"
    key: "{{ item.stdout }}"
    state: present
  loop: "{{ ssh_keys_result.results }}"
  when: item.stdout is defined and item.stdout != ""
